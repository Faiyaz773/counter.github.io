<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faiyaz ✨ Nabila</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(ellipse at bottom, #0d0d0d 0%, #000 100%);
    color: #d4af37;
}

/* Stars Layer */
.stars {
    position: fixed;
    top:0;
    left:0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* Shooting star */
.shooting-star {
    position: fixed;
    width: 2px;
    height: 80px;
    background: linear-gradient(-45deg, white, transparent);
    opacity: 0;
    transform: rotate(45deg);
    animation: shoot 5s linear infinite;
    z-index: 1;
}

@keyframes shoot {
    0% { top: -100px; left: 80%; opacity: 1; }
    100% { top: 100%; left: -10%; opacity: 0; }
}

/* Floating Hearts */
.heart {
    position: fixed;
    bottom: -50px;
    font-size: 16px;
    color: #d4af37;
    animation: floatUp linear infinite;
    z-index: 1;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 0.7; }
    100% { transform: translateY(-110vh) scale(1.4); opacity: 0; }
}

/* Main Container */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 30px;
    width: 90%;
    max-width: 420px;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
}

/* Text Styles */
h1 { font-size:28px; margin-bottom:10px; text-shadow:0 0 12px rgba(212,175,55,0.8); }
.subtitle { font-size:16px; margin-bottom:25px; min-height:24px; }
.counter {
    font-size:18px;
    line-height:1.8;
    background: rgba(255, 215, 0, 0.05);
    padding:20px;
    border-radius:15px;
    border:1px solid rgba(212,175,55,0.3);
}

/* Responsive */
@media (max-width:480px){
    h1{ font-size:24px; }
    .counter{ font-size:16px; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="shooting-star"></div>

<div class="container">
    <h1>Faiyaz ✨ Nabila</h1>
    <div class="subtitle" id="typing"></div>
    <div class="counter" id="loveCounter"></div>
</div>

<script>
// Start Date
const startDate = new Date("2025-02-03T00:00:00");

// Typing Animation
const text = "Our forever started on 3 February 2025...";
let index = 0;
function typeEffect() {
    if(index<text.length){
        document.getElementById("typing").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect,50);
    }
}
typeEffect();

// Grammar helper
function formatUnit(value, unit){ return value+" "+unit+(value===1?"":"s"); }

// Love Counter
function updateCounter(){
    const now = new Date();
    let years = now.getFullYear()-startDate.getFullYear();
    let months = now.getMonth()-startDate.getMonth();
    let days = now.getDate()-startDate.getDate();
    let hours = now.getHours()-startDate.getHours();
    let minutes = now.getMinutes()-startDate.getMinutes();
    let seconds = now.getSeconds()-startDate.getSeconds();

    if(seconds<0){ seconds+=60; minutes--; }
    if(minutes<0){ minutes+=60; hours--; }
    if(hours<0){ hours+=24; days--; }
    if(days<0){
        const prevMonth=new Date(now.getFullYear(), now.getMonth(), 0);
        days+=prevMonth.getDate(); months--;
    }
    if(months<0){ months+=12; years--; }

    document.getElementById("loveCounter").innerHTML = `
        ${formatUnit(years,"year")}<br>
        ${formatUnit(months,"month")}<br>
        ${formatUnit(days,"day")}<br>
        ${formatUnit(hours,"hour")}<br>
        ${formatUnit(minutes,"minute")}<br>
        ${formatUnit(seconds,"second")}
    `;
}
updateCounter();
setInterval(updateCounter,1000);

// Floating Hearts
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*3+4)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),7000);
}
setInterval(createHeart,800);

// Stars
for(let i=0;i<80;i++){
    const star=document.createElement("div");
    star.classList.add("star");
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    star.style.animationDuration=(Math.random()*2+1)+"s";
    document.getElementById("stars").appendChild(star);
}
</script>

</body>
</html>
